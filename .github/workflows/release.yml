name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-package:
    name: Build package (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
          - runner: macos-26
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Build binaries
        run: |
          cargo build -p mimium-bintools --release --bins
          cargo build --release \
            -p mimium-midi \
            -p mimium-symphonia \
            -p mimium-guitools \
            -F mimium-midi/dynamic-plugin-abi \
            -F mimium-symphonia/dynamic-plugin-abi

      - name: Package release (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            plugin_ext="dylib"
          else
            plugin_ext="so"
          fi

          pkg_root="mimium-${TAG}-${TARGET}"
          mkdir -p "$pkg_root"

          cp "target/release/mimium-cli" "$pkg_root/"
          cp "target/release/mimium-language-server" "$pkg_root/"
          cp "target/release/mimium-language-server-worker" "$pkg_root/"
          cp "target/release/mimium-fmt" "$pkg_root/"

          cp "target/release/libmimium_midi.${plugin_ext}" "$pkg_root/mimium-midi.${plugin_ext}"
          cp "target/release/libmimium_symphonia.${plugin_ext}" "$pkg_root/mimium-symphonia.${plugin_ext}"
          cp "target/release/libmimium_guitools.${plugin_ext}" "$pkg_root/mimium-guitools.${plugin_ext}"

          cp -R lib "$pkg_root/lib"
          cp -R examples "$pkg_root/examples"
          cp Readme.md "$pkg_root/Readme.md"
          cp LICENSE "$pkg_root/LICENSE"

          zip -r "${pkg_root}.zip" "$pkg_root"

      - name: Package release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          $ErrorActionPreference = 'Stop'

          $pkgRoot = "mimium-$env:TAG-$env:TARGET"
          New-Item -ItemType Directory -Path $pkgRoot | Out-Null

          Copy-Item "target/release/mimium-cli.exe" "$pkgRoot/mimium-cli.exe"
          Copy-Item "target/release/mimium-language-server.exe" "$pkgRoot/mimium-language-server.exe"
          Copy-Item "target/release/mimium-language-server-worker.exe" "$pkgRoot/mimium-language-server-worker.exe"
          Copy-Item "target/release/mimium-fmt.exe" "$pkgRoot/mimium-fmt.exe"

          Copy-Item "target/release/mimium_midi.dll" "$pkgRoot/mimium-midi.dll"
          Copy-Item "target/release/mimium_symphonia.dll" "$pkgRoot/mimium-symphonia.dll"
          Copy-Item "target/release/mimium_guitools.dll" "$pkgRoot/mimium-guitools.dll"

          Copy-Item "lib" "$pkgRoot/lib" -Recurse
          Copy-Item "examples" "$pkgRoot/examples" -Recurse
          Copy-Item "Readme.md" "$pkgRoot/Readme.md"
          Copy-Item "LICENSE" "$pkgRoot/LICENSE"

          Compress-Archive -Path $pkgRoot -DestinationPath "$pkgRoot.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archive-${{ matrix.target }}
          path: mimium-${{ github.ref_name }}-${{ matrix.target }}.zip

  publish-release:
    name: Publish GitHub Release
    needs: build-package
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-archive-*
          path: dist
          merge-multiple: true

      - name: Publish assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.zip
