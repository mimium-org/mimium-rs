name: Test for Web

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo_test_setup:
    name: "setup test for web"
    runs-on: ubuntu-latest 
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install wasm-pack
        run: which wasm-pack || cargo install wasm-pack
      - name: "mimium-test for web"
        run: wasm-pack test --chrome --headless
        working-directory: crates/lib/mimium-test
      - name: "mimium-lang test for web"
        run: wasm-pack test --chrome --headless
        working-directory: crates/lib/mimium-lang

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: crates/lib/mimium-web/package-lock.json

      - name: Install npm dependencies for web e2e
        run: npm ci
        working-directory: crates/lib/mimium-web

      - name: Install Playwright browser and system deps
        run: npx playwright install --with-deps chromium
        working-directory: crates/lib/mimium-web

      - name: Run Playwright e2e fixture suite
        run: npm run test:e2e
        working-directory: crates/lib/mimium-web